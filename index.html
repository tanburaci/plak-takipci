<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plak Takipçi - Discogs Ara</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a; --surface: #1a1714; --surface2: #242018;
    --border: #3a3228; --accent: #e8a020; --accent2: #c45c1a;
    --text: #f0ebe3; --text2: #9a9080; --text3: #6a6050;
    --green: #4caf7d; --red: #e05a4a; --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
  .container { max-width: 860px; margin: 0 auto; padding: 40px 24px; }
  header { margin-bottom: 32px; }
  .logo-row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px; flex-wrap: wrap; }
  h1 { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 700; color: var(--accent); letter-spacing: -1px; }
  .logo-tag { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 3px; border: 1px solid var(--border); padding: 3px 8px; border-radius: 2px; }
  .subtitle { font-size: 13px; color: var(--text2); }

  .format-filter {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .format-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 8px 20px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .format-btn:hover, .format-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  .search-section { margin-bottom: 28px; }
  .barcode-row, .search-box { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .barcode-input, .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    min-width: 200px;
  }
  .search-input { font-family: 'Playfair Display', serif; font-size: 18px; font-style: italic; padding: 14px 18px; }
  .barcode-input:focus, .search-input:focus { border-color: var(--accent); }
  
  .btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    padding: 12px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn:hover { background: #f0b030; }
  .btn:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }

  .token-panel {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .token-header {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    padding: 12px 0;
    user-select: none;
  }
  .token-header:hover { opacity: 0.7; }
  .token-header h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text3); margin: 0; }
  .token-header .toggle-icon { color: var(--text3); font-size: 12px; transition: transform 0.2s; display: inline-block; }
  .token-header.open .toggle-icon { transform: rotate(180deg); }
  .token-content {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-top: 8px;
  }
  .token-content.show { display: block; }
  .token-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .token-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; min-width: 200px; }
  .token-status { font-size: 11px; padding: 4px 10px; border-radius: 2px; }
  .status-ok { background: rgba(76,175,125,0.15); color: var(--green); border: 1px solid rgba(76,175,125,0.3); }
  .status-err { background: rgba(224,90,74,0.15); color: var(--red); border: 1px solid rgba(224,90,74,0.3); }

  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text3); margin-bottom: 6px; }
  .stat-value { font-size: 22px; color: var(--accent); font-family: 'Playfair Display', serif; }

  .filters { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
  .filter-btn { background: transparent; border: 1px solid var(--border); border-radius: 2px; padding: 6px 14px; color: var(--text2); font-size: 11px; cursor: pointer; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .sort-select { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 6px 12px; color: var(--text2); font-size: 11px; cursor: pointer; margin-left: auto; }

  .listing-grid { display: flex; flex-direction: column; gap: 10px; }
  .listing-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; display: grid; grid-template-columns: 1fr auto; gap: 12px; text-decoration: none; color: inherit; transition: all 0.2s; }
  .listing-card:hover { border-color: var(--accent); background: var(--surface2); }
  .listing-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; }
  .listing-artist { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .listing-meta { display: flex; gap: 10px; flex-wrap: wrap; }
  .meta-tag { font-size: 10px; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; border: 1px solid var(--border); color: var(--text3); }
  .price-main { font-size: 24px; font-family: 'Playfair Display', serif; color: var(--accent); line-height: 1; }
  .price-shipping { font-size: 11px; color: var(--text3); }
  .seller-row { font-size: 11px; color: var(--text3); margin-top: 6px; }

  .release-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
  .release-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; gap: 12px; flex-wrap: wrap; }
  .release-item:hover { border-color: var(--accent); background: var(--surface2); }
  .pick-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 2px; padding: 5px 14px; font-size: 11px; cursor: pointer; text-transform: uppercase; }
  .back-btn { background: transparent; border: none; color: var(--text3); font-size: 11px; cursor: pointer; margin-bottom: 20px; }
  .back-btn:hover { color: var(--accent); }
  
  .loading { text-align: center; padding: 60px 20px; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .message-box { text-align: center; padding: 60px 20px; }
  .message-box .big { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text2); }
  .error-box { background: rgba(224,90,74,0.08); border: 1px solid rgba(224,90,74,0.3); border-radius: var(--radius); padding: 20px 24px; color: #e07060; font-size: 13px; }

  @media (max-width: 600px) {
    .listing-card { grid-template-columns: 1fr; }
    .price-block { text-align: left; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-row">
      <h1>Plak Takipçi</h1>
      <span class="logo-tag">Discogs</span>
    </div>
    <p class="subtitle">Satılık ilanları ara · fiyatları karşılaştır</p>
  </header>

  <div class="format-filter">
    <button class="format-btn active" data-format="vinyl" onclick="setFormat('vinyl')">🎵 Plak</button>
    <button class="format-btn" data-format="cassette" onclick="setFormat('cassette')">📼 Kaset</button>
    <button class="format-btn" data-format="cd" onclick="setFormat('cd')">💿 CD</button>
  </div>

  <div class="search-section">
    <div class="barcode-row">
      <input type="text" class="barcode-input" id="barcodeInput" placeholder="Barkod / Katalog No" onkeydown="if(event.key==='Enter')searchByBarcode()">
      <button class="btn" onclick="searchByBarcode()">Barkod Ara</button>
    </div>
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="Plak adı veya sanatçı ara..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn" id="searchBtn" onclick="doSearch()">Ara</button>
    </div>
  </div>

  <div id="mainContent">
    <div class="message-box">
      <div style="font-size:36px;margin-bottom:12px;">🎵</div>
      <div class="big">Plak aramaya başla</div>
      <div style="margin-top:8px;font-size:12px;">Not: CORS sorunu nedeniyle sonuçlar yeni sekmede açılacaktır.</div>
    </div>
  </div>

  <div class="token-panel">
    <div class="token-header" onclick="toggleToken()">
      <h3>⚙️ API Ayarları</h3>
      <span class="toggle-icon">▼</span>
    </div>
    <div class="token-content" id="tokenContent">
      <div class="token-row">
        <input type="password" id="tokenInput" placeholder="Discogs API Token">
        <button class="btn" onclick="saveToken()">Kaydet</button>
        <span id="tokenStatus"></span>
      </div>
      <p class="token-hint" style="margin-top:12px;font-size:11px;color:var(--text3);">
        Token: <a href="https://www.discogs.com/settings/developers" target="_blank">discogs.com/settings/developers</a>
      </p>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('discogs_token') || '';
let currentFormat = 'vinyl';
let lastSearchResults = [];

const formatMap = {
  'vinyl': ['Vinyl', 'LP', '12"', '7"', '10"'],
  'cassette': ['Cassette', 'Tape'],
  'cd': ['CD', 'CDr', 'CD-ROM']
};

function toggleToken() {
  const content = document.getElementById('tokenContent');
  const header = document.querySelector('.token-header');
  content.classList.toggle('show');
  header.classList.toggle('open');
}

if (token) {
  document.getElementById('tokenInput').value = token;
  document.getElementById('tokenStatus').className = 'token-status status-ok';
  document.getElementById('tokenStatus').textContent = '✓ Token var';
}

function saveToken() {
  const val = document.getElementById('tokenInput').value.trim();
  if (val) {
    token = val;
    localStorage.setItem('discogs_token', val);
    document.getElementById('tokenStatus').className = 'token-status status-ok';
    document.getElementById('tokenStatus').textContent = '✓ Kaydedildi';
  }
}

function setFormat(format) {
  currentFormat = format;
  document.querySelectorAll('.format-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.dataset.format === format) btn.classList.add('active');
  });
}

// Doğrudan Discogs web sitesine yönlendir - CORS sorununu aşmak için
function searchByBarcode() {
  const barcode = document.getElementById('barcodeInput').value.trim();
  if (!barcode) return alert('Barkod girin');
  window.open(`https://www.discogs.com/search/?q=${encodeURIComponent(barcode)}&type=release`, '_blank');
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  
  // Format filtresine göre arama URL'i oluştur
  let formatParam = '';
  if (currentFormat === 'vinyl') formatParam = '&format=Vinyl';
  else if (currentFormat === 'cd') formatParam = '&format=CD';
  else if (currentFormat === 'cassette') formatParam = '&format=Cassette';
  
  const searchUrl = `https://www.discogs.com/search/?q=${encodeURIComponent(q)}&type=release${formatParam}`;
  window.open(searchUrl, '_blank');
  
  // Kullanıcıya bilgi ver
  document.getElementById('mainContent').innerHTML = `
    <div class="message-box">
      <div style="font-size:36px;margin-bottom:12px;">🔗</div>
      <div class="big">Discogs'ta açılıyor</div>
      <div style="margin-top:8px;font-size:12px;">Yeni sekmede sonuçlar görünecek.<br>Sayfayı kapatmayın, Discogs'ta filtreleyip inceleyebilirsiniz.</div>
      <button class="btn" style="margin-top:20px;" onclick="location.reload()">Yeni Arama</button>
    </div>
  `;
}

// Alternatif: Direkt marketplace linki ile ilanları gösterme
function showMarketplace(releaseId, title) {
  window.open(`https://www.discogs.com/sell/list?release_id=${releaseId}&ev=rb`, '_blank');
  document.getElementById('mainContent').innerHTML = `
    <div class="message-box">
      <div class="big">📀 ${title.substring(0, 50)}</div>
      <div style="margin:16px 0;">Discogs marketplace'de açılıyor...</div>
      <a href="https://www.discogs.com/sell/list?release_id=${releaseId}" target="_blank" class="btn" style="display:inline-block;">İlanları Gör →</a>
      <button class="btn" style="margin-left:10px;background:transparent;border:1px solid var(--accent);color:var(--accent);" onclick="location.reload()">Yeni Arama</button>
    </div>
  `;
}

// Örnek veri - demo amaçlı
function showDemoResults() {
  const demos = [
    { id: 9001381, title: "Mor Ve Ötesi - Dünya Yalan Söylüyor", year: 2004, format: "LP" },
    { id: 1234567, title: "Mor Ve Ötesi - Gül Kendine", year: 2001, format: "CD" },
    { id: 2345678, title: "Mor Ve Ötesi - Daha İyi Olamazdım", year: 2008, format: "LP" }
  ];
  
  let html = `<div class="release-list"><div class="message-box"><div class="big">🎯 Örnek Sonuçlar (Demo)</div><div style="margin-bottom:16px;">API bağlantı sorunu nedeniyle örnek sonuçlar gösteriliyor. Discogs'a yönlendirileceksiniz.</div></div>`;
  demos.forEach(r => {
    html += `
      <div class="release-item" onclick="showMarketplace(${r.id}, '${r.title}')">
        <div>
          <div class="r-title">${r.title}</div>
          <div class="r-meta" style="font-size:11px;color:var(--text3);">${r.year} · ${r.format}</div>
        </div>
        <button class="pick-btn">İlanları Gör →</button>
      </div>`;
  });
  html += `</div>`;
  document.getElementById('mainContent').innerHTML = html;
}

// API çalışmazsa demo göster
setTimeout(() => {
  if (document.getElementById('mainContent').innerHTML.includes('Plak aramaya başla')) {
    showDemoResults();
  }
}, 1000);
</script>
</body>
</html>
