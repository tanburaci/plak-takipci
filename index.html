<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plak Takipçi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a; --surface: #1a1714; --surface2: #242018;
    --border: #3a3228; --accent: #e8a020; --accent2: #c45c1a;
    --text: #f0ebe3; --text2: #9a9080; --text3: #6a6050;
    --green: #4caf7d; --red: #e05a4a; --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; padding: 0; }
  .container { max-width: 860px; margin: 0 auto; padding: 40px 24px; }
  header { margin-bottom: 40px; }
  .logo-row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 700; color: var(--accent); letter-spacing: -1px; }
  .logo-tag { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 3px; border: 1px solid var(--border); padding: 3px 8px; border-radius: 2px; }
  .subtitle { font-size: 13px; color: var(--text2); }

  .token-panel { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent2); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 28px; }
  .token-panel h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 12px; }
  .token-row { display: flex; gap: 10px; align-items: center; }
  input[type=password], input[type=text] { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); }
  .token-hint { font-size: 11px; color: var(--text3); margin-top: 10px; line-height: 1.6; }
  .token-hint a { color: var(--accent); text-decoration: none; }
  .token-status { font-size: 11px; padding: 4px 10px; border-radius: 2px; white-space: nowrap; }
  .status-ok { background: rgba(76,175,125,0.15); color: var(--green); border: 1px solid rgba(76,175,125,0.3); }
  .status-err { background: rgba(224,90,74,0.15); color: var(--red); border: 1px solid rgba(224,90,74,0.3); }

  .search-box { display: flex; gap: 10px; margin-bottom: 24px; }
  .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; color: var(--text); font-family: 'Playfair Display', serif; font-size: 18px; font-style: italic; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .btn { background: var(--accent); color: var(--bg); border: none; border-radius: var(--radius); padding: 14px 24px; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: background 0.2s, transform 0.1s; white-space: nowrap; }
  .btn:hover { background: #f0b030; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }

  .filters { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 2px; }
  .filter-btn { background: transparent; border: 1px solid var(--border); border-radius: 2px; padding: 6px 14px; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; letter-spacing: 1px; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .sort-select { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 6px 12px; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; outline: none; cursor: pointer; margin-left: auto; }

  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text3); margin-bottom: 6px; }
  .stat-value { font-size: 22px; color: var(--accent); font-family: 'Playfair Display', serif; }

  .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .results-count { font-size: 12px; color: var(--text3); }
  .results-count span { color: var(--accent); }
  .listing-grid { display: flex; flex-direction: column; gap: 10px; }
  .listing-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start; transition: border-color 0.2s, background 0.2s; text-decoration: none; color: inherit; }
  .listing-card:hover { border-color: var(--accent); background: var(--surface2); }
  .listing-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .listing-artist { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .listing-meta { display: flex; gap: 10px; flex-wrap: wrap; }
  .meta-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; padding: 3px 8px; border-radius: 2px; border: 1px solid var(--border); color: var(--text3); }
  .cond-mint { background: rgba(76,175,125,0.1); border-color: rgba(76,175,125,0.3); color: var(--green); }
  .cond-good { background: rgba(76,175,125,0.05); border-color: rgba(76,175,125,0.2); color: #8ecfa8; }
  .cond-fair { background: rgba(224,90,74,0.08); border-color: rgba(224,90,74,0.25); color: #e07060; }
  .price-block { text-align: right; }
  .price-main { font-size: 24px; font-family: 'Playfair Display', serif; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .price-shipping { font-size: 11px; color: var(--text3); }
  .seller-row { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .seller-rating { color: var(--accent2); }

  .loading { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .message-box { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 13px; line-height: 2; }
  .message-box .big { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text2); font-style: italic; }

  .release-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
  .release-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.15s; }
  .release-item:hover { border-color: var(--accent); background: var(--surface2); }
  .release-item .r-title { font-size: 14px; color: var(--text); margin-bottom: 3px; }
  .release-item .r-meta { font-size: 11px; color: var(--text3); }
  .pick-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 2px; padding: 5px 14px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; transition: all 0.15s; }
  .pick-btn:hover { background: var(--accent); color: var(--bg); }
  .back-btn { background: transparent; border: none; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; padding: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
  .back-btn:hover { color: var(--accent); }

  .error-box { background: rgba(224,90,74,0.08); border: 1px solid rgba(224,90,74,0.3); border-radius: var(--radius); padding: 20px 24px; color: #e07060; font-size: 13px; line-height: 1.8; }
  .error-box strong { display: block; margin-bottom: 8px; font-size: 14px; }
  .error-box ol { padding-left: 20px; color: var(--text2); margin-top: 10px; }
  .error-box li { margin-bottom: 6px; }
  .error-box a { color: var(--accent); text-decoration: none; }

  @media (max-width: 600px) {
    h1 { font-size: 28px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .listing-card { grid-template-columns: 1fr; }
    .price-block { text-align: left; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-row">
      <h1>Plak Takipçi</h1>
      <span class="logo-tag">Discogs API</span>
    </div>
    <p class="subtitle">Satılık ilanları ara · fiyatları karşılaştır · en iyi teklifi bul</p>
  </header>

  <div class="token-panel">
    <h3>🔑 Discogs API Token</h3>
    <div class="token-row">
      <input type="password" id="tokenInput" placeholder="Token buraya yapıştır..." autocomplete="off">
      <button class="btn" onclick="saveToken()">Kaydet</button>
      <span id="tokenStatus"></span>
    </div>
    <p class="token-hint">
      Token almak için: <a href="https://www.discogs.com/settings/developers" target="_blank">discogs.com/settings/developers</a> → <em>"Generate new token"</em> tıkla → kopyala → buraya yapıştır.
    </p>
  </div>

  <div class="search-box">
    <input type="text" class="search-input" id="searchInput" placeholder="Plak adı veya sanatçı ara..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn" id="searchBtn" onclick="doSearch()">Ara</button>
  </div>

  <div id="mainContent">
    <div class="message-box">
      <div style="font-size:36px;margin-bottom:12px;">🎵</div>
      <div class="big">Plak aramaya başla</div>
      <div style="margin-top:8px;font-size:12px;">Token gir, plak adı yaz, ara.</div>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('discogs_token') || '';
let currentListings = [];
let currentCondFilter = 'all';
let currentSort = 'price_asc';
let lastSearchResults = [];
let lastQuery = '';

if (token) {
  document.getElementById('tokenInput').value = token;
  setTokenStatus(true);
}

function saveToken() {
  const val = document.getElementById('tokenInput').value.trim();
  if (!val) return;
  token = val;
  localStorage.setItem('discogs_token', val);
  setTokenStatus(true);
}

function setTokenStatus(ok) {
  const el = document.getElementById('tokenStatus');
  el.className = 'token-status ' + (ok ? 'status-ok' : 'status-err');
  el.textContent = ok ? '✓ Token hazır' : '✗ Hata';
}

async function discogsGet(path) {
  // Try direct first, fall back to allorigins proxy
  const directUrl = 'https://api.discogs.com' + path;
  const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(directUrl + (path.includes('?') ? '&' : '?') + 'token=' + token);

  try {
    const res = await fetch(directUrl, {
      headers: {
        'Authorization': `Discogs token=${token}`,
        'User-Agent': 'PlakTakipci/1.0'
      }
    });
    if (res.status === 405 || res.status === 0) throw new Error('CORS');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  } catch(e) {
    // Fallback: proxy
    const pRes = await fetch(proxyUrl);
    if (!pRes.ok) throw new Error('Proxy de çalışmadı');
    const wrapper = await pRes.json();
    return JSON.parse(wrapper.contents);
  }
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  if (!token) { alert('Önce Discogs API token gir!'); return; }

  lastQuery = q;
  showLoading('Aranıyor...');
  document.getElementById('searchBtn').disabled = true;

  try {
    const data = await discogsGet(`/database/search?q=${encodeURIComponent(q)}&type=release&per_page=10`);
    lastSearchResults = data.results || [];
    showReleases(lastSearchResults);
  } catch(e) {
    showApiError(e.message);
  }
  document.getElementById('searchBtn').disabled = false;
}

function showReleases(releases) {
  if (!releases.length) {
    document.getElementById('mainContent').innerHTML = `<div class="message-box"><div style="font-size:36px">🔍</div><div class="big">Sonuç bulunamadı</div></div>`;
    return;
  }
  let html = `<div class="release-list">`;
  releases.forEach(r => {
    const year = r.year || '?';
    const label = r.label ? r.label[0] : '';
    const format = r.format ? r.format[0] : '';
    html += `
      <div class="release-item" onclick="loadListings(${r.id}, ${JSON.stringify(escHtml(r.title))})">
        <div>
          <div class="r-title">${escHtml(r.title)}</div>
          <div class="r-meta">${year}${label?' · '+escHtml(label):''}${format?' · '+escHtml(format):''}</div>
        </div>
        <button class="pick-btn">İlanları Gör →</button>
      </div>`;
  });
  html += `</div>`;
  document.getElementById('mainContent').innerHTML = html;
}

async function loadListings(releaseId, title) {
  showLoading('Satılık ilanlar yükleniyor...');
  try {
    const data = await discogsGet(`/marketplace/listings?release_id=${releaseId}&status=For+Sale&per_page=100&sort=price&sort_order=asc`);
    currentListings = data.listings || [];
    currentCondFilter = 'all';
    currentSort = 'price_asc';
    renderListings(title, releaseId);
  } catch(e) {
    showApiError(e.message);
  }
}

function condClass(cond) {
  if (!cond) return '';
  const c = cond.toLowerCase();
  if (c.includes('mint') || c.includes('nm')) return 'cond-mint';
  if (c.includes('very good') || c.includes('vg')) return 'cond-good';
  return 'cond-fair';
}

function renderListings(title, releaseId) {
  let filtered = [...currentListings];

  if (currentCondFilter !== 'all') {
    filtered = filtered.filter(l => {
      const c = (l.condition || '').toLowerCase();
      if (currentCondFilter === 'nm') return c.includes('near mint') || c.includes('mint (m)');
      if (currentCondFilter === 'vg') return c.includes('very good');
      if (currentCondFilter === 'g') return c.includes('good') && !c.includes('very good');
      return true;
    });
  }

  if (currentSort === 'price_asc') filtered.sort((a,b) => getPrice(a) - getPrice(b));
  if (currentSort === 'price_desc') filtered.sort((a,b) => getPrice(b) - getPrice(a));
  if (currentSort === 'cond') {
    const o = {'Mint (M)':0,'Near Mint (NM or M-)':1,'Very Good Plus (VG+)':2,'Very Good (VG)':3,'Good Plus (G+)':4,'Good (G)':5,'Fair (F)':6,'Poor (P)':7};
    filtered.sort((a,b) => (o[a.condition]??9)-(o[b.condition]??9));
  }

  const prices = filtered.map(getPrice).filter(p=>p>0);
  const minP = prices.length ? Math.min(...prices) : 0;
  const maxP = prices.length ? Math.max(...prices) : 0;
  const avgP = prices.length ? prices.reduce((a,b)=>a+b,0)/prices.length : 0;
  const currency = filtered[0]?.price?.currency || 'USD';

  const tid = JSON.stringify(title).replace(/"/g,'&quot;');

  let html = `
    <button class="back-btn" onclick="showReleases(lastSearchResults)">← Arama Sonuçlarına Dön</button>
    <div style="margin-bottom:18px;">
      <div style="font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:var(--text);margin-bottom:4px;">${title}</div>
      <a href="https://www.discogs.com/marketplace?release_id=${releaseId}" target="_blank" style="font-size:11px;color:var(--text3);text-decoration:none;letter-spacing:1px;text-transform:uppercase;">Discogs'ta Gör ↗</a>
    </div>
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-label">Toplam İlan</div><div class="stat-value">${filtered.length}</div></div>
      <div class="stat-card"><div class="stat-label">En Ucuz</div><div class="stat-value">${minP?fmt(minP):'—'}</div></div>
      <div class="stat-card"><div class="stat-label">Ortalama</div><div class="stat-value">${avgP?fmt(avgP):'—'}</div></div>
      <div class="stat-card"><div class="stat-label">En Pahalı</div><div class="stat-value">${maxP?fmt(maxP):'—'}</div></div>
    </div>
    <div class="filters">
      <span class="filter-label">Durum:</span>
      <button class="filter-btn ${currentCondFilter==='all'?'active':''}" onclick="setFilter('all',${tid},${releaseId})">Tümü</button>
      <button class="filter-btn ${currentCondFilter==='nm'?'active':''}" onclick="setFilter('nm',${tid},${releaseId})">NM / Mint</button>
      <button class="filter-btn ${currentCondFilter==='vg'?'active':''}" onclick="setFilter('vg',${tid},${releaseId})">VG / VG+</button>
      <button class="filter-btn ${currentCondFilter==='g'?'active':''}" onclick="setFilter('g',${tid},${releaseId})">Good</button>
      <select class="sort-select" onchange="setSort(this.value,${tid},${releaseId})">
        <option value="price_asc" ${currentSort==='price_asc'?'selected':''}>Fiyat ↑</option>
        <option value="price_desc" ${currentSort==='price_desc'?'selected':''}>Fiyat ↓</option>
        <option value="cond" ${currentSort==='cond'?'selected':''}>Durum</option>
      </select>
    </div>
    <div class="results-header">
      <div class="results-count"><span>${filtered.length}</span> ilan</div>
      <div style="font-size:11px;color:var(--text3);">${currency}</div>
    </div>
    <div class="listing-grid">`;

  if (!filtered.length) {
    html += `<div class="message-box"><div class="big">Bu filtreyle ilan yok</div></div>`;
  } else {
    filtered.slice(0,50).forEach(l => {
      const cond = l.condition || '';
      const shipP = l.shipping_price?.value || 0;
      const totalP = getPrice(l);
      const sellerRating = l.seller?.stats?.rating ? `★ ${parseFloat(l.seller.stats.rating).toFixed(1)}` : '';
      const ships = l.ships_from || '';
      html += `
        <a class="listing-card" href="https://www.discogs.com/sell/item/${l.id}" target="_blank">
          <div>
            <div class="listing-title">${escHtml(l.release?.title||'Bilinmiyor')}</div>
            <div class="listing-artist">${escHtml(l.release?.artist||'')}</div>
            <div class="listing-meta">
              <span class="meta-tag ${condClass(cond)}">${escHtml(cond)}</span>
              ${l.sleeve_condition?`<span class="meta-tag">Kapak: ${escHtml(l.sleeve_condition)}</span>`:''}
              ${ships?`<span class="meta-tag">📍 ${escHtml(ships)}</span>`:''}
            </div>
            ${l.comment?`<div style="font-size:11px;color:var(--text3);margin-top:8px;line-height:1.5;">${escHtml(l.comment.substring(0,120))}${l.comment.length>120?'...':''}</div>`:''}
            <div class="seller-row">Satıcı: ${escHtml(l.seller?.username||'?')} ${sellerRating?`<span class="seller-rating">${sellerRating}</span>`:''}</div>
          </div>
          <div class="price-block">
            <div class="price-main">${totalP?fmt(totalP):'—'} <span style="font-size:13px;color:var(--text3);">${currency}</span></div>
            ${shipP>0?`<div class="price-shipping">+${fmt(shipP)} kargo</div>`:'<div class="price-shipping">kargo ayrı</div>'}
          </div>
        </a>`;
    });
  }
  html += `</div>`;
  document.getElementById('mainContent').innerHTML = html;
}

function setFilter(f, title, id) { currentCondFilter = f; renderListings(title, id); }
function setSort(s, title, id) { currentSort = s; renderListings(title, id); }
function getPrice(l) { return parseFloat(l.price?.value||0); }
function fmt(n) { return n.toFixed(2); }
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function showLoading(msg) {
  document.getElementById('mainContent').innerHTML = `<div class="loading"><div class="spinner"></div>${msg}</div>`;
}
function showApiError(msg) {
  document.getElementById('mainContent').innerHTML = `
    <div class="error-box">
      <strong>⚠️ Bağlantı Hatası</strong>
      ${msg}
      <ol>
        <li>Token doğru mu? <a href="https://www.discogs.com/settings/developers" target="_blank">Yeni token al</a></li>
        <li>Tarayıcın VPN veya engelleyici var mı?</li>
        <li>Sayfayı yenile ve tekrar dene</li>
      </ol>
    </div>`;
}
</script>
</body>
</html>
